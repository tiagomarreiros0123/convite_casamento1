<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kamilly & Tiago</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Cormorant+Garamond:wght@300&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Cormorant Garamond', serif;
    background: #f4efe9;
    color: #6b1c2a;
    overflow-x: hidden;
}

/* FUNDO FIXO (MARCA D'ÁGUA) */
.bg-text {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 0;
    pointer-events: none;
    text-align: center;
}

/* mensagem convite fundo */
.bg-message {
    font-size: 1.1rem;
    opacity: 0.18;
    letter-spacing: 1px;
    margin-bottom: 40px;
}

/* nomes fundo */
.bg-names {
    font-family: 'Playfair Display', serif;
    font-size: 8vw;
    opacity: 0.12;
}

/* CONTEÚDO */
.container {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 30px;
    padding: 60px 20px;
}

/* CARDS */
.card {
    background: rgba(255, 255, 255, 0.75);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(107, 28, 42, 0.15);
    border-radius: 20px;
    padding: 30px 25px;
    width: 100%;
    max-width: 420px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

/* CARD NOME */
.card h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
}

/* INFO */
.info {
    font-size: 1.1rem;
    line-height: 1.6;
}

/* BOTÃO */
.btn {
    margin-top: 20px;
    padding: 12px 25px;
    border-radius: 30px;
    border: 1px solid #6b1c2a;
    color: #6b1c2a;
    text-decoration: none;
    display: inline-block;
    transition: 0.3s;
}

.btn:hover {
    background: #6b1c2a;
    color: white;
}

/* CONTADOR */
#countdown {
    margin-top: 10px;
    font-size: 0.95rem;
}

/* RESPONSIVO */
@media (max-width: 600px) {
    .bg-names {
        font-size: 14vw;
    }
}
</style>
</head>

<body>

<!-- FUNDO FIXO -->
<div class="bg-text">
    <div class="bg-message">
        Com muita alegria<br>
        convidamos você para celebrar nosso casamento
    </div>

    <div class="bg-names">
        KAMILLY<br>&<br>TIAGO
    </div>
</div>

<!-- CONTEÚDO -->
<div class="container">

    <!-- CARD 1 -->
    <div class="card">
        <h1>KAMILLY & TIAGO</h1>
    </div>

    <!-- CARD 2 -->
    <div class="card">
        <div class="info">
            Dia 20 de novembro de 2027<br>
            às 18h30min<br>
            Primeira Igreja Batista de Itaperuna
        </div>

        <div id="countdown"></div>

        <a class="btn" id="confirmar" target="_blank">
            Confirmar presença
        </a>
    </div>

</div>

<script>
// CONTADOR
const data = new Date(2027, 10, 20, 18, 30).getTime();

setInterval(() => {
    const now = new Date().getTime();
    const diff = data - now;

    const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
    const horas = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

    document.getElementById("countdown").innerHTML =
        `Faltam ${dias} dias e ${horas} horas`;
}, 1000);

// WHATSAPP
const numero = "5522988214942";

document.getElementById("confirmar").href =
`https://wa.me/${numero}?text=Confirmo%20minha%20presença%20no%20casamento`;
</script>

</body>
</html>
