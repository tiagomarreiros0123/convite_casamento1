<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kamilly & Tiago</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Cormorant+Garamond:wght@300&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Cormorant Garamond', serif;
    background: #f4efe9;
    color: #6b1c2a;
    overflow-x: hidden;
}

/* TELA INICIAL */
.opening {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #6b1c2a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 1000;
    transition: 1s;
}

.opening button {
    margin-top: 20px;
    padding: 12px 30px;
    border-radius: 30px;
    border: none;
    background: white;
    color: #6b1c2a;
    cursor: pointer;
}

/* TEXTO TOPO */
#textoTopo {
    position: fixed;
    top: 10%;
    left: 30%;
    transform: translate(-50%, -50%);
    font-size: 1rem;
    letter-spacing: 1px;
    z-index: 0; /* fica no fundo */
    opacity: 2.25; /* efeito mais suave */
    text-align: center;
    pointer-events: none;
}

/* LETRAS FUNDO */
.bg-letter {
    position: fixed;
    font-family: 'Playfair Display', serif;
    color: #e9e1d9;
    z-index: 0;
    pointer-events: none;
}
    .bg-letter {
    z-index: 0;
}

.k {
    top: -110px;
    left: 800px;
    font-size: 24vw;
}

.t {
    bottom: -30px;
    right: 275px;
    font-size: 24vw;
}

.e {
    top: 50%;
    left: 30%;
    transform: translate(-50%, -50%);
    font-size: 18vw;
    opacity: 1.3;
}

/* CONTEÚDO */
 .main {
    position: relative;
    z-index: 2;
}

.main.show {
    opacity: 1;
    transform: translateY(0);
}

/* SEÇÃO */
.section {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 20px;
}

/* NOMES */
.names {
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: 3.5rem;
}

/* INFO */
.info {
    text-align: center;
    font-size: 1.2rem;
    margin-top: 20px;
    line-height: 1.6;
}

/* BOTÃO */
.btn {
    margin-top: 25px;
    padding: 12px 30px;
    border: 1px solid #6b1c2a;
    border-radius: 30px;
    text-decoration: none;
    color: #6b1c2a;
    display: inline-block;
}

/* CONTADOR */
#countdown {
    margin-top: 10px;
    font-size: 0.9rem;
}

/* RESPONSIVO */
@media (max-width: 768px) {

    .names {
        font-size: 2.4rem;
    }

    .info {
        font-size: 1rem;
    }

    @media (max-width: 768px) {

    .k {
        top: 150px;
        left: 55%;
        font-size: 30vw;
    }

    .t {
        bottom: 200px;
        right: 55%;
        font-size: 30vw;
    }

    .e {
        top: 52%;
        left: 20%;
        transform: translate(-50%, -50%);
        font-size: 22vw;
    }
}
}
</style>
</head>

<body>

<!-- ABERTURA -->
<div class="opening" id="opening">
    <h1>Você foi convidado</h1>
    <button onclick="abrirConvite()">Abrir convite</button>
</div>

<!-- TEXTO TOPO -->
<div id="textoTopo">
    Com muita alegria<br>
    convidamos você para<br>
    celebrar nosso<br>
    casamento
</div>

<!-- LETRAS -->
<div class="bg-letter k">K</div>
<div class="bg-letter t">T</div>
<div class="bg-letter e">&</div>

<!-- CONTEÚDO -->
<div class="main" id="main">
    <div class="section">

        <div class="names">
            KAMILLY &<br>
            TIAGO
        </div>
</div>

        </div>
        <div class="info">
            Dia 20 de novembro de 2027<br>
            às 18h30min<br>
            Primeira Igreja Batista de Itaperuna

            <div id="countdown"></div>

            <a class="btn" id="confirmar" target="_blank">
                Confirmar presença
            </a>
        </div>

    </div>
</div>

<script>
// ABRIR
function abrirConvite(){
    document.getElementById("opening").style.opacity = "0";

    setTimeout(() => {
        document.getElementById("opening").style.display = "none";
        document.getElementById("main").classList.add("show");
    }, 1000);
}

// CONTADOR
const data = new Date(2027, 10, 20, 18, 30).getTime();

setInterval(() => {
    const now = new Date().getTime();
    const diff = data - now;

    const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
    const horas = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

    document.getElementById("countdown").innerHTML =
        `Faltam ${dias} dias e ${horas} horas`;
}, 1000);

// WHATSAPP
const numero = "5522988214942";

document.getElementById("confirmar").href =
`https://wa.me/${numero}?text=Confirmo%20minha%20presença%20no%20casamento`;
</script>

</body>
</html>
