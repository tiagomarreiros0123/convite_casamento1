<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kamilly & Tiago</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Cormorant+Garamond:wght@300&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Cormorant Garamond', serif;
    background: #f4efe9;
    color: #6b1c2a;
    overflow-x: hidden;
}

/* FUNDO FIXO */
.bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
}

/* mensagem fundo */
.bg-message {
    position: absolute;
    top: 18%;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    font-size: 1.1rem;
    opacity: 0.18;
    line-height: 1.5;
}

/* LETRAS K E T SEPARADAS */
.bg-letter {
    position: absolute;
    font-family: 'Playfair Display', serif;
    font-size: 30vw;
    color: #e9e1d9;
    opacity: 0.25;
}

.k {
    top: 5%;
    left: 10%;
}

.t {
    bottom: 5%;
    right: 10%;
}

/* CONTAINER */
.container {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
}

/* CARD GRANDE (EFEITO PÁGINA) */
.card {
    width: 100%;
    max-width: 700px;
    min-height: 80vh;

    background: rgba(255, 255, 255, 0.6);
    backdrop-filter: blur(10px);

    border-radius: 25px;
    padding: 50px 30px;

    box-shadow:
        0 20px 60px rgba(0,0,0,0.15),
        inset 0 0 0 1px rgba(107, 28, 42, 0.1);

    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 40px;
}

/* NOME */
.title {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    text-align: center;
}

/* INFO */
.info {
    text-align: center;
    font-size: 1.2rem;
    line-height: 1.7;
}

/* CONTADOR */
#countdown {
    margin-top: 10px;
    font-size: 1rem;
}

/* BOTÃO */
.btn {
    margin-top: 25px;
    padding: 14px 30px;
    border-radius: 40px;
    border: 1px solid #6b1c2a;
    text-decoration: none;
    color: #6b1c2a;
    display: inline-block;
    transition: 0.3s;
}

.btn:hover {
    background: #6b1c2a;
    color: white;
}

/* RESPONSIVO */
@media (max-width: 768px) {
    .title {
        font-size: 2.2rem;
    }

    .card {
        min-height: auto;
        padding: 35px 20px;
    }

    .bg-letter {
        font-size: 40vw;
    }
}
</style>
</head>

<body>

<!-- FUNDO -->
<div class="bg">

    <div class="bg-message">
        Com muita alegria<br>
        convidamos você para celebrar nosso casamento
    </div>

    <div class="bg-letter k">K</div>
    <div class="bg-letter t">T</div>

</div>

<!-- CONTEÚDO -->
<div class="container">

    <div class="card">

        <div class="title">
            KAMILLY & TIAGO
        </div>

        <div class="info">
            Dia 20 de novembro de 2027<br>
            às 18h30min<br>
            Primeira Igreja Batista de Itaperuna

            <div id="countdown"></div>

            <a class="btn" id="confirmar" target="_blank">
                Confirmar presença
            </a>
        </div>

    </div>

</div>

<script>
// CONTADOR
const data = new Date(2027, 10, 20, 18, 30).getTime();

setInterval(() => {
    const now = new Date().getTime();
    const diff = data - now;

    const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
    const horas = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

    document.getElementById("countdown").innerHTML =
        `Faltam ${dias} dias e ${horas} horas`;
}, 1000);

// WHATSAPP
const numero = "5522988214942";

document.getElementById("confirmar").href =
`https://wa.me/${numero}?text=Confirmo%20minha%20presença%20no%20casamento`;
</script>

</body>
</html>
